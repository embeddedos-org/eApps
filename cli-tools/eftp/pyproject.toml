[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "eos-eftp"
version = "1.0.0"
description = "FTP/SFTP client - EoS CLI Tool"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
dependencies = ["click>=8.1", "rich>=13.0"]

[project.scripts]
eos-eftp = "eftp.cli:main"
