name: eosuite
description: EoSuite - Embedded OS Service Apps
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.9
  firebase_storage: ^11.5.6
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  shared_preferences: ^2.2.2
  http: ^1.2.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8
  firebase_core_platform_interface: ^5.0.0
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
