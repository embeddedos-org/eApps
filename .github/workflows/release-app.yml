name: Release App
on:
  push:
    tags:
      - '*-v*'   # e.g. eoffice-desktop-v1.0.0, ebrowser-v1.2.0, eride-v2.0.0

permissions:
  contents: write

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    outputs:
      app_id: ${{ steps.parse.outputs.app_id }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APP_ID="${TAG%-v*}"
          VERSION="${TAG#*-v}"
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App: ${APP_ID}, Version: ${VERSION}"

  build-desktop:
    needs: parse-tag
    if: contains(needs.parse-tag.outputs.app_id, 'desktop') || contains(needs.parse-tag.outputs.app_id, 'ebrowser') || contains(needs.parse-tag.outputs.app_id, 'eostudio')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build desktop app
        run: echo "Building ${{ needs.parse-tag.outputs.app_id }} v${{ needs.parse-tag.outputs.version }} on ${{ matrix.os }}"
      # Add real build steps per app

  build-mobile:
    needs: parse-tag
    if: contains(needs.parse-tag.outputs.app_id, 'eride') || contains(needs.parse-tag.outputs.app_id, 'esocial') || contains(needs.parse-tag.outputs.app_id, 'etrack') || contains(needs.parse-tag.outputs.app_id, 'etravel') || contains(needs.parse-tag.outputs.app_id, 'ewallet')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Build APK
        run: |
          cd mobile-apps/${{ needs.parse-tag.outputs.app_id }}
          flutter pub get
          flutter build apk --release

  build-extension:
    needs: parse-tag
    if: contains(needs.parse-tag.outputs.app_id, 'chrome') || contains(needs.parse-tag.outputs.app_id, 'firefox') || contains(needs.parse-tag.outputs.app_id, 'vscode')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build extension
        run: |
          cd extensions/${{ needs.parse-tag.outputs.app_id }}
          npm ci
          npm run build

  create-release:
    needs: [parse-tag, build-desktop, build-mobile, build-extension]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.parse-tag.outputs.app_id }} v${{ needs.parse-tag.outputs.version }}"
          body: "Automated release of **${{ needs.parse-tag.outputs.app_id }}** version `${{ needs.parse-tag.outputs.version }}`."
          draft: false
          prerelease: false
          # files: build/artifacts/*

  update-catalog:
    needs: [parse-tag, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update apps.json version
        run: |
          APP_ID="${{ needs.parse-tag.outputs.app_id }}"
          VERSION="${{ needs.parse-tag.outputs.version }}"
          python3 -c "
          import json, sys
          with open('data/apps.json', 'r') as f:
              data = json.load(f)
          for app in data['apps']:
              if app['id'] == '${APP_ID}':
                  app['version'] = '${VERSION}'
                  break
          data['meta']['lastUpdated'] = '$(date +%Y-%m-%d)'
          with open('data/apps.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apps.json
          git diff --cached --quiet || git commit -m "chore: update ${{ needs.parse-tag.outputs.app_id }} to v${{ needs.parse-tag.outputs.version }}"
          git push
