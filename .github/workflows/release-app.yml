name: Release App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App module to build and release"
        required: true
        type: choice
        options:
          - ecal
          - enote
          - eftp
          - econverter
          - etools
          - ebuffer
          - ecleaner
          - eclock
          - efiles
          - ezip
          - epaint
          - epdf
          - eguard
          - emusic
          - evideo
          - egallery
          - eplay
          - snake
          - tetris
          - minesweeper
          - dice
          - echess
          - ebirds
          - eslice
          - erunner
          - eblocks
          - ecrush
          - esurfer
          - essh
          - eserial
          - echat
          - etunnel
          - evpn
          - evirustower
          - evnc
          - eweb

jobs:
  build:
    name: Build ${{ inputs.app_name }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew :apps:${{ inputs.app_name }}:assembleRelease --no-daemon
        continue-on-error: true

      - name: Build Desktop JAR
        run: ./gradlew :apps:${{ inputs.app_name }}:jvmJar --no-daemon

      - name: Upload Android APK
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-android
          path: apps/${{ inputs.app_name }}/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-${{ matrix.platform }}
          path: apps/${{ inputs.app_name }}/build/libs/*.jar
          retention-days: 30
          if-no-files-found: ignore
