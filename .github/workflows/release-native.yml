name: Release Native

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-suite:
    name: Suite (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
            cmake_extra: ""
          - os: windows-latest
            platform: windows-x64
            ext: zip
            cmake_extra: ""
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz
            cmake_extra: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package Suite (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-suite-${VERSION}-${{ matrix.platform }}"
          mkdir -p ${PKG}/bin
          # Copy suite executable
          cp build/apps/suite/eapps_suite ${PKG}/bin/ 2>/dev/null || true
          # Copy standalone app executables
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            cp "$f" ${PKG}/bin/
          done
          # Add readme
          echo "eApps Suite ${VERSION} for ${{ matrix.platform }}" > ${PKG}/README.txt
          echo "Run: ./bin/eapps_suite" >> ${PKG}/README.txt
          tar czf ${PKG}.${{ matrix.ext }} ${PKG}/

      - name: Package Suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $PKG = "eapps-suite-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force "${PKG}/bin"
          Get-ChildItem -Path build/apps -Recurse -Filter "*.exe" | Copy-Item -Destination "${PKG}/bin/" -ErrorAction SilentlyContinue
          "eApps Suite ${VERSION} for ${{ matrix.platform }}" | Set-Content "${PKG}/README.txt"
          Compress-Archive -Path "${PKG}/*" -DestinationPath "${PKG}.zip"

      - name: Upload Suite
        uses: actions/upload-artifact@v4
        with:
          name: suite-${{ matrix.platform }}
          path: eapps-suite-*
          if-no-files-found: ignore
          retention-days: 90

  build-individual:
    name: Apps (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            ext: zip
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON
          cmake --build build --config Release

      - name: Package Individual Apps (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p individual
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            APP=$(basename "$f" | sed 's/_standalone$//')
            PKG="eapps-${APP}-${VERSION}-${{ matrix.platform }}"
            mkdir -p ${PKG}
            cp "$f" ${PKG}/${APP}
            tar czf individual/${PKG}.tar.gz ${PKG}/
          done

      - name: Package Individual Apps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force individual
          Get-ChildItem -Path build/apps -Recurse -Filter "*_standalone.exe" | ForEach-Object {
            $app = $_.BaseName -replace '_standalone$', ''
            $pkg = "eapps-${app}-${VERSION}-${{ matrix.platform }}"
            New-Item -ItemType Directory -Force $pkg
            Copy-Item $_.FullName "${pkg}/${app}.exe"
            Compress-Archive -Path "${pkg}/*" -DestinationPath "individual/${pkg}.zip"
          }

      - name: Upload Individual Apps
        uses: actions/upload-artifact@v4
        with:
          name: individual-${{ matrix.platform }}
          path: individual/
          if-no-files-found: ignore
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [build-suite, build-individual]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | while read f; do
            sha256sum "$f"
          done > SHA256SUMS.txt
          mv artifacts/* . 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "eApps ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            eapps-suite-*.tar.gz
            eapps-suite-*.zip
            eapps-*-linux-*.tar.gz
            eapps-*-windows-*.zip
            eapps-*-macos-*.tar.gz
            SHA256SUMS.txt
