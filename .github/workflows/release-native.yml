name: Release Native

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # ── Desktop suite builds (Linux / Windows / macOS) ────────────────
  build-suite:
    name: Suite (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            ext: zip
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package Suite (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-suite-${VERSION}-${{ matrix.platform }}"
          mkdir -p ${PKG}/bin
          cp build/apps/suite/eapps_suite ${PKG}/bin/ 2>/dev/null || true
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            cp "$f" ${PKG}/bin/
          done
          echo "eApps Suite ${VERSION} for ${{ matrix.platform }}" > ${PKG}/README.txt
          echo "Run: ./bin/eapps_suite" >> ${PKG}/README.txt
          tar czf ${PKG}.${{ matrix.ext }} ${PKG}/

      - name: Package Suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $PKG = "eapps-suite-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force "${PKG}/bin"
          Get-ChildItem -Path build/apps -Recurse -Filter "*.exe" | Copy-Item -Destination "${PKG}/bin/" -ErrorAction SilentlyContinue
          "eApps Suite ${VERSION} for ${{ matrix.platform }}" | Set-Content "${PKG}/README.txt"
          Compress-Archive -Path "${PKG}/*" -DestinationPath "${PKG}.zip"

      - name: Upload Suite
        uses: actions/upload-artifact@v7
        with:
          name: suite-${{ matrix.platform }}
          path: eapps-suite-*
          if-no-files-found: ignore
          retention-days: 90

  # ── Individual app packages ───────────────────────────────────────
  build-individual:
    name: Apps (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            ext: zip
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON
          cmake --build build --config Release

      - name: Package Individual Apps (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p individual
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            APP=$(basename "$f" | sed 's/_standalone$//')
            PKG="eapps-${APP}-${VERSION}-${{ matrix.platform }}"
            mkdir -p ${PKG}
            cp "$f" ${PKG}/${APP}
            tar czf individual/${PKG}.tar.gz ${PKG}/
          done

      - name: Package Individual Apps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force individual
          Get-ChildItem -Path build/apps -Recurse -Filter "*_standalone.exe" | ForEach-Object {
            $app = $_.BaseName -replace '_standalone$', ''
            $pkg = "eapps-${app}-${VERSION}-${{ matrix.platform }}"
            New-Item -ItemType Directory -Force $pkg
            Copy-Item $_.FullName "${pkg}/${app}.exe"
            Compress-Archive -Path "${pkg}/*" -DestinationPath "individual/${pkg}.zip"
          }

      - name: Upload Individual Apps
        uses: actions/upload-artifact@v7
        with:
          name: individual-${{ matrix.platform }}
          path: individual/
          if-no-files-found: ignore
          retention-days: 90

  # ── EoS cross-compiled release artifacts ──────────────────────────
  build-eos:
    name: EoS (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            platform: eos-aarch64
          - arch: arm-hf
            pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            platform: eos-arm-hf
          - arch: riscv64
            pkg: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            platform: eos-riscv64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y cmake ${{ matrix.pkg }}
      - name: Configure (EoS)
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/eos.cmake -DCMAKE_C_COMPILER=${{ matrix.cc }}
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-${VERSION}-${{ matrix.platform }}"
          mkdir -p ${PKG}/lib ${PKG}/bin
          find build -name "*.a" -type f | while read f; do
            cp "$f" ${PKG}/lib/
          done
          find build/apps -type f -executable | while read f; do
            cp "$f" ${PKG}/bin/ 2>/dev/null || true
          done
          echo "eApps ${VERSION} for EoS ${{ matrix.arch }}" > ${PKG}/README.txt
          tar czf ${PKG}.tar.gz ${PKG}/
      - name: Upload EoS artifact
        uses: actions/upload-artifact@v7
        with:
          name: eos-${{ matrix.platform }}
          path: eapps-*-eos-*.tar.gz
          if-no-files-found: ignore
          retention-days: 90

  # ── WASM build ────────────────────────────────────────────────────
  build-wasm:
    name: WASM (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
      - name: Configure
        run: cmake -B build-web -DCMAKE_TOOLCHAIN_FILE=cmake/emscripten.cmake
      - name: Build
        run: cmake --build build-web -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-${VERSION}-wasm"
          mkdir -p ${PKG}
          find build-web -name "*.wasm" -o -name "*.js" -o -name "*.html" | while read f; do
            cp "$f" ${PKG}/
          done
          echo "eApps ${VERSION} for Web (WASM)" > ${PKG}/README.txt
          tar czf ${PKG}.tar.gz ${PKG}/
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: eapps-*-wasm.tar.gz
          if-no-files-found: ignore
          retention-days: 90

  # ── EoSim validation before release ───────────────────────────────
  eosim-check:
    name: EoSim Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install EoSim
        run: pip install "eosim @ https://github.com/embeddedos-org/EoSim/releases/download/v0.1.0/eosim-0.1.0-py3-none-any.whl"
      - name: Validate key platforms
        run: |
          eosim doctor
          eosim list
          eosim doctor
            eosim test $PLAT || true
          for PLAT in x86_64-linux arm64-linux riscv64-linux stm32f4 raspi4 esp32 nrf52; do
            eosim test $PLAT || true
            echo "✅ $PLAT validated"
          done

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-suite, build-individual, build-eos, build-wasm, eosim-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | while read f; do
            sha256sum "$f"
          done > SHA256SUMS.txt
          mv artifacts/* . 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "eApps ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## eApps ${{ github.ref_name }}

            ### Desktop (Suite + Standalone Apps)
            - 🐧 Linux x64
            - 🪟 Windows x64
            - 🍎 macOS x64

            ### EoS Embedded (Cross-compiled)
            - ARM64 (aarch64)
            - ARM HardFloat (arm-hf)
            - RISC-V 64

            ### Web
            - Emscripten/WASM

            See SHA256SUMS.txt for file integrity verification.
          files: |
            eapps-suite-*.tar.gz
            eapps-suite-*.zip
            eapps-*-linux-*.tar.gz
            eapps-*-windows-*.zip
            eapps-*-macos-*.tar.gz
            eapps-*-eos-*.tar.gz
            eapps-*-wasm.tar.gz
            SHA256SUMS.txt
