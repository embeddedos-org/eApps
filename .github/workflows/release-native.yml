name: Release Native

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # ── Desktop suite builds (Linux / Windows / macOS) ────────────────
  build-suite:
    name: Suite (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            ext: zip
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package Suite (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-suite-${VERSION}-${{ matrix.platform }}"
          mkdir -p ${PKG}/bin
          cp build/apps/suite/eapps_suite ${PKG}/bin/ 2>/dev/null || true
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            cp "$f" ${PKG}/bin/
          done
          echo "eApps Suite ${VERSION} for ${{ matrix.platform }}" > ${PKG}/README.txt
          echo "Run: ./bin/eapps_suite" >> ${PKG}/README.txt
          tar czf ${PKG}.${{ matrix.ext }} ${PKG}/

      - name: Package Suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $PKG = "eapps-suite-${VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force "${PKG}/bin"
          Get-ChildItem -Path build/apps -Recurse -Filter "*.exe" | Copy-Item -Destination "${PKG}/bin/" -ErrorAction SilentlyContinue
          "eApps Suite ${VERSION} for ${{ matrix.platform }}" | Set-Content "${PKG}/README.txt"
          Compress-Archive -Path "${PKG}/*" -DestinationPath "${PKG}.zip"

      - name: Upload Suite
        uses: actions/upload-artifact@v4
        with:
          name: suite-${{ matrix.platform }}
          path: eapps-suite-*
          if-no-files-found: ignore
          retention-days: 90

  # ── Individual app packages ───────────────────────────────────────
  build-individual:
    name: Apps (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            ext: zip
          - os: macos-latest
            platform: macos-x64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DEAPPS_BUILD_STANDALONE=ON
          cmake --build build --config Release

      - name: Package Individual Apps (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p individual
          find build/apps -name "*_standalone" -type f -executable | while read f; do
            APP=$(basename "$f" | sed 's/_standalone$//')
            PKG="eapps-${APP}-${VERSION}-${{ matrix.platform }}"
            mkdir -p ${PKG}
            cp "$f" ${PKG}/${APP}
            tar czf individual/${PKG}.tar.gz ${PKG}/
          done

      - name: Package Individual Apps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force individual
          Get-ChildItem -Path build/apps -Recurse -Filter "*_standalone.exe" | ForEach-Object {
            $app = $_.BaseName -replace '_standalone$', ''
            $pkg = "eapps-${app}-${VERSION}-${{ matrix.platform }}"
            New-Item -ItemType Directory -Force $pkg
            Copy-Item $_.FullName "${pkg}/${app}.exe"
            Compress-Archive -Path "${pkg}/*" -DestinationPath "individual/${pkg}.zip"
          }

      - name: Upload Individual Apps
        uses: actions/upload-artifact@v4
        with:
          name: individual-${{ matrix.platform }}
          path: individual/
          if-no-files-found: ignore
          retention-days: 90

  # ── EoS cross-compiled release artifacts ──────────────────────────
  build-eos:
    name: EoS (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            platform: eos-aarch64
          - arch: arm-hf
            pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            platform: eos-arm-hf
          - arch: riscv64
            pkg: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            platform: eos-riscv64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y cmake ${{ matrix.pkg }}
      - name: Configure (EoS)
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/eos.cmake -DCMAKE_C_COMPILER=${{ matrix.cc }}
      - name: Build
        run: cmake --build build -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-${VERSION}-${{ matrix.platform }}"
          mkdir -p ${PKG}/lib ${PKG}/bin
          find build -name "*.a" -type f | while read f; do
            cp "$f" ${PKG}/lib/
          done
          find build/apps -type f -executable | while read f; do
            cp "$f" ${PKG}/bin/ 2>/dev/null || true
          done
          echo "eApps ${VERSION} for EoS ${{ matrix.arch }}" > ${PKG}/README.txt
          tar czf ${PKG}.tar.gz ${PKG}/
      - name: Upload EoS artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-${{ matrix.platform }}
          path: eapps-*-eos-*.tar.gz
          if-no-files-found: ignore
          retention-days: 90

  # ── WASM build ────────────────────────────────────────────────────
  build-wasm:
    name: WASM (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
      - name: Configure
        run: cmake -B build-web -DCMAKE_TOOLCHAIN_FILE=cmake/emscripten.cmake
      - name: Build
        run: cmake --build build-web -j$(nproc)
      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="eapps-${VERSION}-wasm"
          mkdir -p ${PKG}
          find build-web -name "*.wasm" -o -name "*.js" -o -name "*.html" | while read f; do
            cp "$f" ${PKG}/
          done
          echo "eApps ${VERSION} for Web (WASM)" > ${PKG}/README.txt
          tar czf ${PKG}.tar.gz ${PKG}/
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: eapps-*-wasm.tar.gz
          if-no-files-found: ignore
          retention-days: 90

  # ── EoSim validation before release ───────────────────────────────
  eosim-check:
    name: EoSim Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install EoSim
        run: pip install "eosim @ https://github.com/embeddedos-org/EoSim/releases/download/v0.1.0/eosim-0.1.0-py3-none-any.whl"
      - name: Validate key platforms
        run: |
          eosim doctor
          eosim list
          for PLAT in x86_64-linux arm64-linux riscv64-linux stm32f4 raspi4 esp32 nrf52; do
            eosim test $PLAT || true
            echo "✅ $PLAT validated"
          done

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-suite, build-individual, build-eos, build-wasm, eosim-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-files/ \; 2>/dev/null || true

      - name: Generate SHA256SUMS
        working-directory: release-files
        run: sha256sum * > SHA256SUMS.txt 2>/dev/null || true

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom 2>/dev/null || true
          cat > release-files/sbom.cdx.json << SBOM_EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "serialNumber": "urn:uuid:$(uuidgen 2>/dev/null || echo "00000000-0000-0000-0000-000000000000")",
            "version": 1,
            "metadata": {
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "component": {
                "type": "application",
                "name": "eApps",
                "version": "${{ inputs.tag }}",
                "description": "EoS Application Suite",
                "supplier": { "name": "embeddedos-org" },
                "licenses": [{ "license": { "id": "MIT" } }]
              }
            },
            "components": [
              { "type": "library", "name": "lvgl", "version": "9.1.0", "purl": "pkg:github/lvgl/lvgl@v9.1.0" },
              { "type": "library", "name": "SDL2", "version": "2.x", "purl": "pkg:generic/sdl2" }
            ]
          }
          SBOM_EOF

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd release-files
          for f in *.tar.gz *.zip; do
            [ -f "$f" ] && cosign sign-blob --yes --bundle "${f}.sig.bundle" "$f" 2>/dev/null || true
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "eApps ${{ inputs.tag }}"
          generate_release_notes: true
          make_latest: true
          body: |
            ## eApps ${{ inputs.tag }}

            ### Desktop (Suite + Standalone Apps)
            - 🐧 Linux x64
            - 🪟 Windows x64
            - 🍎 macOS x64

            ### EoS Embedded (Cross-compiled)
            - ARM64 (aarch64)
            - ARM HardFloat (arm-hf)
            - RISC-V 64

            ### Web
            - Emscripten/WASM

            ### Integrity
            - `SHA256SUMS.txt` — file checksums
            - `sbom.cdx.json` — CycloneDX SBOM (v1.5)
            - `*.sig.bundle` — cosign signatures (Sigstore)

            > Verify: `sha256sum -c SHA256SUMS.txt`
            > Verify signatures: `cosign verify-blob --bundle <file>.sig.bundle <file>`
          files: release-files/*
