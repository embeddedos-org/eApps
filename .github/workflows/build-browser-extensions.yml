name: Build & Release Browser Extensions
on:
  push:
    tags:
      - 'eoffice-chrome-v*'
      - 'eoffice-firefox-v*'
      - 'eoffice-safari-v*'
      - 'eos-ext-*-v*'
    branches: [master]
    paths:
      - 'extensions/browser/**'
      - 'browser-extensions/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target browser (chrome, firefox, all)'
        required: true
        default: 'all'
        type: choice
        options: [chrome, firefox, all]
      extension_app:
        description: 'Extension app to build (leave empty for all, or specify app name from browser-extensions/)'
        required: false
        type: string
        default: ''
  workflow_call:

permissions:
  contents: write
  pages: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Legacy eOffice extension builds (from extensions/browser/)
  # ────────────────────────────────────────────────────────────────
  build-chrome-eoffice:
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'chrome' || inputs.target == 'all') && inputs.extension_app == '' ||
      startsWith(github.ref, 'refs/tags/eoffice-chrome') ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: extensions/browser
        run: npm ci --ignore-scripts 2>/dev/null || true

      - name: Build Chrome extension
        working-directory: extensions/browser
        run: |
          VERSION="${GITHUB_REF_NAME#eoffice-chrome-v}"
          [ "$VERSION" = "$GITHUB_REF_NAME" ] && VERSION="0.0.0-dev"

          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json

          mkdir -p ../../dist
          zip -r ../../dist/eoffice-chrome-${VERSION}.zip . \
            -x "node_modules/*" "*.git*" "package*.json" "tsconfig*"

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-eoffice
          path: dist/eoffice-chrome-*.zip

  build-firefox-eoffice:
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.target == 'firefox' || inputs.target == 'all') && inputs.extension_app == '' ||
      startsWith(github.ref, 'refs/tags/eoffice-firefox') ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build Firefox extension (.xpi)
        working-directory: extensions/browser
        run: |
          VERSION="${GITHUB_REF_NAME#eoffice-firefox-v}"
          [ "$VERSION" = "$GITHUB_REF_NAME" ] && VERSION="0.0.0-dev"

          jq --arg v "$VERSION" '
            .version = $v |
            .browser_specific_settings = {
              "gecko": {
                "id": "eoffice@embeddedos.org",
                "strict_min_version": "109.0",
                "update_url": "https://embeddedos-org.github.io/eApps/updates/firefox-updates.json"
              }
            }
          ' manifest.json > manifest_ff.json && mv manifest_ff.json manifest.json

          mkdir -p ../../dist
          web-ext build --artifacts-dir ../../dist --filename eoffice-firefox-${VERSION}.xpi \
            --ignore-files "node_modules" "package*.json" "tsconfig*"

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension-eoffice
          path: dist/eoffice-firefox-*.xpi

  # ────────────────────────────────────────────────────────────────
  # New browser-extensions/ matrix build (20 apps)
  # ────────────────────────────────────────────────────────────────
  discover-browser-extensions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_apps: ${{ steps.discover.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover browser extension apps
        id: discover
        run: |
          FILTER="${{ inputs.extension_app }}"
          APPS="[]"
          for dir in browser-extensions/*/; do
            APP_NAME=$(basename "$dir")
            if [ -f "${dir}manifest.json" ]; then
              if [ -z "$FILTER" ] || [ "$APP_NAME" = "$FILTER" ]; then
                APPS=$(echo "$APPS" | jq -c --arg app "$APP_NAME" '. + [$app]')
              fi
            fi
          done
          echo "matrix={\"app\":$APPS}" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$APPS" | jq '. | length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          fi

  build-browser-extension:
    needs: discover-browser-extensions
    if: needs.discover-browser-extensions.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-browser-extensions.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Install dependencies
        working-directory: browser-extensions/${{ matrix.app }}
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == eos-ext-${{ matrix.app }}-v* ]]; then
            VERSION="${GITHUB_REF_NAME#eos-ext-${{ matrix.app }}-v}"
          else
            VERSION=$(jq -r '.version // "0.0.0-dev"' browser-extensions/${{ matrix.app }}/manifest.json)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Chrome extension (.zip)
        working-directory: browser-extensions/${{ matrix.app }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json
          mkdir -p ../../dist
          zip -r ../../dist/${{ matrix.app }}-chrome-${VERSION}.zip . \
            -x "node_modules/*" "*.git*" "package*.json" "tsconfig*" ".eslint*"

      - name: Build Firefox extension (.xpi)
        working-directory: browser-extensions/${{ matrix.app }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '
            .version = $v |
            .browser_specific_settings = {
              "gecko": {
                "id": "'${{ matrix.app }}'@embeddedos.org",
                "strict_min_version": "109.0"
              }
            }
          ' manifest.json > manifest_ff.json && mv manifest_ff.json manifest.json
          web-ext build --artifacts-dir ../../dist \
            --filename ${{ matrix.app }}-firefox-${VERSION}.xpi \
            --ignore-files "node_modules" "package*.json" "tsconfig*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-ext-${{ matrix.app }}
          path: dist/*

  # ────────────────────────────────────────────────────────────────
  # Release (tag-triggered only)
  # ────────────────────────────────────────────────────────────────
  release:
    needs: [build-chrome-eoffice, build-firefox-eoffice, build-browser-extension]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Browser Extension ${{ github.ref_name }}"
          body: |
            ## Browser Extension Release

            ### Installation
            **Chrome:**
            1. Download the `.zip` file below
            2. Go to `chrome://extensions/`
            3. Enable "Developer mode"
            4. Click "Load unpacked" and select the extracted folder

            **Firefox:**
            1. Download the `.xpi` file below
            2. Go to `about:addons`
            3. Click gear icon → "Install Add-on From File"
            4. Select the `.xpi` file
          files: dist/*

  update-auto-update-manifest:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Chrome update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#*-v}"
          TAG="${GITHUB_REF_NAME}"
          mkdir -p updates

          cat > updates/chrome-updates.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='eoffice-extension-id'>
              <updatecheck codebase='https://github.com/embeddedos-org/eApps/releases/download/${TAG}/eoffice-chrome-${VERSION}.zip' version='${VERSION}' />
            </app>
          </gupdate>
          EOF

      - name: Generate Firefox update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#*-v}"
          TAG="${GITHUB_REF_NAME}"

          cat > updates/firefox-updates.json << EOF
          {
            "addons": {
              "eoffice@embeddedos.org": {
                "updates": [
                  {
                    "version": "${VERSION}",
                    "update_link": "https://github.com/embeddedos-org/eApps/releases/download/${TAG}/eoffice-firefox-${VERSION}.xpi"
                  }
                ]
              }
            }
          }
          EOF

      - name: Commit update manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/
          git diff --cached --quiet || git commit -m "chore: update browser extension auto-update manifests"
          git push
