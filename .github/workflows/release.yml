name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (native)
        run: |
          cmake -B build -DBUILD_TESTING=ON
          cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cross-compile:
    name: Cross-Compile (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-linux
            packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            artifact_suffix: aarch64-linux
          - arch: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            artifact_suffix: arm-linux-gnueabihf
          - arch: riscv64-linux
            packages: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
            artifact_suffix: riscv64-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Cross-compile
        run: |
          cmake -B build-${{ matrix.arch }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.arch }}
      - name: Package
        run: |
          mkdir -p staging
          find build-${{ matrix.arch }} -name "*.a" -exec cp {} staging/ \;
          tar czf eapps-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: eapps-${{ matrix.artifact_suffix }}
          path: "*.tar.gz"

  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.50"
      - name: Build WASM
        run: |
          emcmake cmake -B build-wasm \
            -DCMAKE_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
            -DCMAKE_BUILD_TYPE=Release 2>/dev/null || \
          cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release
          cmake --build build-wasm || true
          mkdir -p staging
          find build-wasm -name "*.js" -o -name "*.wasm" -o -name "*.html" | xargs -I{} cp {} staging/ 2>/dev/null || true
          find build-wasm -name "*.a" -exec cp {} staging/ \; 2>/dev/null || true
          tar czf eapps-${{ steps.version.outputs.version }}-wasm.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: eapps-wasm
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile, build-wasm]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Build native (x86_64)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir -p staging
          find build -name "*.a" -exec cp {} staging/ \;
          tar czf eapps-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz -C staging .
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: eapps-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eApps ${{ steps.version.outputs.tag }}"
          body: |
            ## eApps ${{ steps.version.outputs.tag }} — EoS Application Suite

            Productivity, media, games, and networking tools for EoS.

            ### Platforms
            | Archive | Target |
            |---|---|
            | `eapps-*-linux-x86_64.tar.gz` | x86_64 Linux (native) |
            | `eapps-*-aarch64-linux.tar.gz` | AArch64 (RPi 4/5, Jetson) |
            | `eapps-*-arm-linux-gnueabihf.tar.gz` | ARM hard-float (RPi 3, BeagleBone) |
            | `eapps-*-riscv64-linux.tar.gz` | RISC-V 64 (SiFive) |
            | `eapps-*-wasm.tar.gz` | WebAssembly (browser) |

            ### Apps included
            - **Productivity:** ecal, enote, econverter, ebuffer, efiles, ecleaner, eclock, etools, etimer, epdf, ezip, eviewer
            - **Media:** emusic, evideo, egallery, eplay, epaint
            - **Games:** snake, tetris, minesweeper, dice, erunner, esurfer, echess, ebirds, eslice, eblocks, ecrush
            - **Connectivity:** eftp, eserial, essh, evnc, etunnel, echat
            - **Security:** evpn, eguard, evirustower
            - **Web:** eweb
          files: |
            *.tar.gz
            SHA256SUMS.txt
          generate_release_notes: true
