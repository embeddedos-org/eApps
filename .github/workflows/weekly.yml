name: eApps Weekly

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  weekly:
    name: Weekly (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build
      - name: Test
        run: ./gradlew test
