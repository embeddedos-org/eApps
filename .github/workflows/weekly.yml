name: eApps Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  EOSIM_VERSION: "0.1.0"

jobs:
  # ── CMake/C comprehensive build + test ────────────────────────────
  native-full:
    name: Native Full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake sdl2

      - name: Configure (all features + tests + standalone)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DEAPPS_BUILD_STANDALONE=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure

  # ── Category isolation builds (verify no cross-contamination) ─────
  category-isolation:
    name: Category ${{ matrix.category }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: productivity
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=ON -DEAPPS_BUILD_MEDIA=OFF -DEAPPS_BUILD_GAMES=OFF -DEAPPS_BUILD_CONNECTIVITY=OFF -DEAPPS_BUILD_SECURITY=OFF -DEAPPS_BUILD_WEB=OFF -DEAPPS_BUILD_SUITE=OFF"
          - category: media
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=OFF -DEAPPS_BUILD_MEDIA=ON -DEAPPS_BUILD_GAMES=OFF -DEAPPS_BUILD_CONNECTIVITY=OFF -DEAPPS_BUILD_SECURITY=OFF -DEAPPS_BUILD_WEB=OFF -DEAPPS_BUILD_SUITE=OFF"
          - category: games
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=OFF -DEAPPS_BUILD_MEDIA=OFF -DEAPPS_BUILD_GAMES=ON -DEAPPS_BUILD_CONNECTIVITY=OFF -DEAPPS_BUILD_SECURITY=OFF -DEAPPS_BUILD_WEB=OFF -DEAPPS_BUILD_SUITE=OFF"
          - category: connectivity
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=OFF -DEAPPS_BUILD_MEDIA=OFF -DEAPPS_BUILD_GAMES=OFF -DEAPPS_BUILD_CONNECTIVITY=ON -DEAPPS_BUILD_SECURITY=OFF -DEAPPS_BUILD_WEB=OFF -DEAPPS_BUILD_SUITE=OFF"
          - category: security
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=OFF -DEAPPS_BUILD_MEDIA=OFF -DEAPPS_BUILD_GAMES=OFF -DEAPPS_BUILD_CONNECTIVITY=OFF -DEAPPS_BUILD_SECURITY=ON -DEAPPS_BUILD_WEB=OFF -DEAPPS_BUILD_SUITE=OFF"
          - category: web
            flags: "-DEAPPS_BUILD_PRODUCTIVITY=OFF -DEAPPS_BUILD_MEDIA=OFF -DEAPPS_BUILD_GAMES=OFF -DEAPPS_BUILD_CONNECTIVITY=OFF -DEAPPS_BUILD_SECURITY=OFF -DEAPPS_BUILD_WEB=ON -DEAPPS_BUILD_SUITE=OFF"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev
      - name: Configure
        run: cmake -B build ${{ matrix.flags }}
      - name: Build
        run: cmake --build build -j$(nproc)

  # ── EoS cross-compilation (all architectures) ─────────────────────
  eos-cross-full:
    name: EoS Cross (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - arch: arm-hf
            pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
          - arch: riscv64
            pkg: gcc-riscv64-linux-gnu
            cc: riscv64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y cmake ${{ matrix.pkg }}
      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/eos.cmake -DCMAKE_C_COMPILER=${{ matrix.cc }}
      - name: Build
        run: cmake --build build -j$(nproc)

  # ── WASM build ────────────────────────────────────────────────────
  wasm-build:
    name: WASM (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.51"
      - name: Configure
        run: cmake -B build-web -DCMAKE_TOOLCHAIN_FILE=cmake/emscripten.cmake
      - name: Build
        run: cmake --build build-web -j$(nproc)

  # ── EoSim comprehensive platform regression ──────────────────────
  eosim-full:
    name: EoSim (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - arm64-linux
          - riscv64-linux
          - stm32f4
          - stm32h7
          - raspi3
          - raspi4
          - raspi5
          - esp32
          - esp32c3
          - esp32s3
          - nrf52
          - nrf5340
          - nrf9160
          - rp2040
          - vexpress-a9
          - vexpress-a15
          - versatilepb
          - sifive_u
          - imx8m
          - jetson-nano
          - jetson-orin
          - ppce500
          - mipsel
          - qemu-q35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install EoSim
        run: pip install "eosim @ https://github.com/embeddedos-org/EoSim/releases/download/v${{ env.EOSIM_VERSION }}/eosim-${{ env.EOSIM_VERSION }}-py3-none-any.whl"
      - name: Validate
        run: eosim list
      - name: Test
        run: eosim test ${{ matrix.platform }}
        continue-on-error: true

  # ── Gradle / KMP build ───────────────────────────────────────────
  gradle-build:
    name: Gradle ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build
        continue-on-error: true
      - name: Test
        run: ./gradlew test
        continue-on-error: true

  # ── Dependency audit ──────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Check LVGL submodule
        run: |
          if [ -f "extern/lvgl/CMakeLists.txt" ]; then
            echo "✅ LVGL submodule present"
            cd extern/lvgl && git log --oneline -5
          else
            echo "⚠️  LVGL submodule missing — stub target will be used"
          fi
      - name: Check cmake toolchain files
        run: |
          for TC in cmake/eos.cmake cmake/linux.cmake cmake/windows.cmake cmake/emscripten.cmake; do
            if [ -f "$TC" ]; then
              echo "✅ $TC"
            else
              echo "❌ Missing: $TC"; exit 1
            fi
          done

  # ── Weekly report ─────────────────────────────────────────────────
  report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [native-full, category-isolation, eos-cross-full, wasm-build, eosim-full, gradle-build, dependency-audit]
    if: always()
    steps:
      - name: Results
        run: |
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║     eApps Weekly Report — $(date -u '+%Y-%m-%d')              ║"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "║ Native builds (3 OS):         ${{ needs.native-full.result }}"
          echo "║ Category isolation (6 cats):   ${{ needs.category-isolation.result }}"
          echo "║ EoS cross-compile (3 arch):    ${{ needs.eos-cross-full.result }}"
          echo "║ WASM build:                    ${{ needs.wasm-build.result }}"
          echo "║ EoSim simulation (25 plats):   ${{ needs.eosim-full.result }}"
          echo "║ Gradle builds (3 OS):          ${{ needs.gradle-build.result }}"
          echo "║ Dependency audit:              ${{ needs.dependency-audit.result }}"
          echo "╚════════════════════════════════════════════════════════╝"
          FAILED=0
          for JOB in "${{ needs.native-full.result }}" \
                     "${{ needs.eos-cross-full.result }}" \
                     "${{ needs.wasm-build.result }}" \
                     "${{ needs.dependency-audit.result }}"; do
            if [ "$JOB" != "success" ]; then FAILED=1; fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ WEEKLY FAILURE — core jobs failed"
            exit 1
          fi
          echo "✅ Weekly checks passed"
