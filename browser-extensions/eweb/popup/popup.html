<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; min-height: 200px; font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #fafafa; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e0; }
    .header h1 { font-size: 16px; margin: 0; color: #1976D2; }
    .content { text-align: center; padding: 24px 0; color: #666; }
    .badge { background: #E3F2FD; color: #1976D2; padding: 4px 10px; border-radius: 12px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">⚡</span>
    <h1>Page Inspector</h1>
  </div>
  <div class="content">
    <p>Page Inspector</p>
    <br>
    <span class="badge">EoS Extension</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
