name: etrack
description: eTrack — Privacy-first, offline-first universal package, flight, and case tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  sqflite: ^2.3.0
  path: ^1.8.0
  dio: ^5.4.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.2.0
  xml: ^6.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
