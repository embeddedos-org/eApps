version: '3.8'
services:
  ebot:
    build: .
    container_name: eos-ebot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - EOS_LICENSE_KEY=${EOS_LICENSE_KEY}
    volumes:
      - ebot_data:/app/data
    networks:
      - eos-enterprise
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ebot_data:

networks:
  eos-enterprise:
    external: true
